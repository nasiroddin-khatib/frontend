<!DOCTYPE html>
<html>
<head>

  <title>DevConnect</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <h1>DevConnect</h1>

    <h2>Register</h2>

    <input
      type="text"
      id="name"
      placeholder="Name"
    >

    <input
      type="email"
      id="email"
      placeholder="Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

    <button onclick="register()">
      Register
    </button>

    <hr>

    <h2>Login</h2>

    <input
      type="email"
      id="loginEmail"
      placeholder="Email"
    >

    <input
      type="password"
      id="loginPassword"
      placeholder="Password"
    >

    <button onclick="login()">
      Login
    </button>

  </div>

  <script src="app.js"></script>

</body>
</html>
